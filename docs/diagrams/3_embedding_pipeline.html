<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleo — Multimodal Embedding Pipeline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100vw;
            max-height: 100vh;
        }

        svg text {
            user-select: none;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }

        .dashed-anim {
            animation: dash 1.2s linear infinite;
        }
    </style>
</head>

<body>
    <svg viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
        <defs>
            <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
                <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(148,163,184,0.035)" stroke-width="0.5" />
            </pattern>
            <linearGradient id="resultGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#7C3AED" />
                <stop offset="100%" stop-color="#06B6D4" />
            </linearGradient>
            <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7"
                orient="auto-start-reverse">
                <path d="M0,0 L10,3.5 L0,7 L2.5,3.5 Z" fill="#475569" />
            </marker>
            <marker id="arr-amber" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7"
                orient="auto-start-reverse">
                <path d="M0,0 L10,3.5 L0,7 L2.5,3.5 Z" fill="#D97706" />
            </marker>
            <marker id="arr-indigo" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7"
                orient="auto-start-reverse">
                <path d="M0,0 L10,3.5 L0,7 L2.5,3.5 Z" fill="#6366F1" />
            </marker>
            <marker id="arr-emerald" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7"
                orient="auto-start-reverse">
                <path d="M0,0 L10,3.5 L0,7 L2.5,3.5 Z" fill="#059669" />
            </marker>
            <marker id="arr-muted" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7"
                orient="auto-start-reverse">
                <path d="M0,0 L10,3.5 L0,7 L2.5,3.5 Z" fill="#64748B" />
            </marker>
            <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
                <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25" />
            </filter>
        </defs>

        <rect width="1600" height="1200" fill="#0F172A" />
        <rect width="1600" height="1200" fill="url(#grid)" />

        <!-- Title -->
        <text x="750" y="60" text-anchor="middle" fill="#E2E8F0" font-size="34" font-weight="700"
            letter-spacing="-0.5">Multimodal Embedding Pipeline</text>
        <text x="750" y="95" text-anchor="middle" fill="#64748B" font-size="14" font-weight="400"
            letter-spacing="3">CLEO · CROSS-MODAL VECTOR SEARCH</text>

        <!-- ═══════ NODES ═══════ -->

        <!-- Video Ingestion (y≈170) -->
        <g>
            <rect x="100" y="160" width="330" height="105" rx="16" fill="#0F2D2E" stroke="#0D9488" stroke-width="1.5"
                filter="url(#shadow)" />
            <text x="170" y="210" fill="#67E8F9" font-size="24">📹</text>
            <text x="300" y="210" text-anchor="middle" fill="#5EEAD4" font-size="20" font-weight="700">Video
                Ingestion</text>
            <text x="290" y="240" text-anchor="middle" fill="#2DD4BF" font-size="13" font-weight="400"
                opacity="0.7">Continuous clip storage</text>
        </g>

        <!-- User Search Query (y≈170) -->
        <g>
            <circle cx="1180" cy="212" r="75" fill="#1E1B4B" stroke="#6366F1" stroke-width="1.5"
                filter="url(#shadow)" />
            <text x="1180" y="202" text-anchor="middle" fill="#C7D2FE" font-size="19" font-weight="700">User
                Search</text>
            <text x="1180" y="228" text-anchor="middle" fill="#A5B4FC" font-size="15" font-weight="500">Query</text>
        </g>
        <text x="1180" y="310" text-anchor="middle" fill="#64748B" font-size="13" font-weight="400">Text / Image /
            Video</text>

        <!-- Amazon Nova (y≈470) -->
        <g>
            <rect x="450" y="460" width="400" height="115" rx="18" fill="#271506" stroke="#D97706" stroke-width="2"
                filter="url(#shadow)" />
            <text x="650" y="510" text-anchor="middle" fill="#FCD34D" font-size="24" font-weight="700">Amazon
                Nova</text>
            <text x="650" y="545" text-anchor="middle" fill="#D97706" font-size="15" font-weight="500">Unified 1024-D
                Vector Space</text>
        </g>

        <!-- FAISS (y≈760) -->
        <g>
            <ellipse cx="380" cy="760" rx="100" ry="20" fill="#1E293B" stroke="#059669" stroke-width="1.5" />
            <rect x="280" y="760" width="200" height="82" fill="#1E293B" stroke="none" />
            <line x1="280" y1="760" x2="280" y2="842" stroke="#059669" stroke-width="1.5" />
            <line x1="480" y1="760" x2="480" y2="842" stroke="#059669" stroke-width="1.5" />
            <ellipse cx="380" cy="842" rx="100" ry="20" fill="#1E293B" stroke="#059669" stroke-width="1.5" />
            <text x="380" y="798" text-anchor="middle" fill="#A7F3D0" font-size="20" font-weight="700">FAISS</text>
            <text x="380" y="826" text-anchor="middle" fill="#6EE7B7" font-size="14"
                font-weight="500">IndexFlatIP</text>
        </g>

        <!-- SQLite (y≈760) -->
        <g>
            <ellipse cx="970" cy="760" rx="95" ry="20" fill="#1E293B" stroke="#64748B" stroke-width="1.2" />
            <rect x="875" y="760" width="190" height="78" fill="#1E293B" stroke="none" />
            <line x1="875" y1="760" x2="875" y2="838" stroke="#64748B" stroke-width="1.2" />
            <line x1="1065" y1="760" x2="1065" y2="838" stroke="#64748B" stroke-width="1.2" />
            <ellipse cx="970" cy="838" rx="95" ry="20" fill="#1E293B" stroke="#64748B" stroke-width="1.2" />
            <text x="970" y="798" text-anchor="middle" fill="#E2E8F0" font-size="20" font-weight="700">SQLite</text>
            <text x="970" y="824" text-anchor="middle" fill="#94A3B8" font-size="14" font-weight="500">Database</text>
        </g>

        <!-- Merge Data (y≈980) -->
        <g>
            <rect x="560" y="975" width="200" height="62" rx="14" fill="#1E293B" stroke="#64748B" stroke-width="1.2"
                filter="url(#shadow)" />
            <text x="660" y="1013" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="600">Merge
                Data</text>
        </g>

        <!-- Cross-Modal Results (y≈1100) -->
        <g>
            <rect x="390" y="1098" width="520" height="65" rx="32" fill="#1E293B" stroke="url(#resultGrad)"
                stroke-width="1.5" filter="url(#shadow)" />
            <text x="650" y="1137" text-anchor="middle" fill="#E2E8F0" font-size="19" font-weight="700">✨ Cross-Modal
                Search Results</text>
        </g>

        <!-- ═══════ CONNECTIONS ═══════ -->

        <!-- Video Ingestion → Nova -->
        <path d="M290,265 L290,400 Q290,445 450,490" stroke="#D97706" stroke-width="1.8" fill="none"
            marker-end="url(#arr-amber)" />
        <rect x="195" y="370" width="150" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="270" y="389" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="500">embed_video()</text>

        <!-- Video Ingestion -.→ SQLite -->
        <path d="M430,225 Q720,225 840,400 Q910,500 970,748" stroke="#64748B" stroke-width="1.3" stroke-dasharray="7,4"
            fill="none" class="dashed-anim" marker-end="url(#arr-muted)" />
        <rect x="775" y="310" width="185" height="44" rx="7" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="867" y="330" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="500">Save MP4 to
            Disk</text>
        <text x="867" y="348" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="500">+ Insert
            Metadata</text>

        <!-- User Search → Nova -->
        <path d="M1110,265 Q1000,380 850,495" stroke="#6366F1" stroke-width="1.8" fill="none"
            marker-end="url(#arr-indigo)" />
        <rect x="970" y="365" width="185" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="1062" y="384" text-anchor="middle" fill="#A5B4FC" font-size="13" font-weight="500">embed_text / image /
            video()</text>

        <!-- Nova → FAISS -->
        <path d="M530,575 Q450,660 405,745" stroke="#D97706" stroke-width="1.8" fill="none"
            marker-end="url(#arr-amber)" />
        <rect x="410" y="655" width="145" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="482" y="674" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="600">1024-D Vector</text>

        <!-- FAISS ↔ SQLite -->
        <line x1="485" y1="800" x2="870" y2="800" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"
            marker-start="url(#arr)" />
        <rect x="575" y="774" width="185" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="667" y="793" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="500">Cross-Link via
            faiss_id</text>

        <!-- FAISS → Merge -->
        <path d="M380,862 Q380,925 555,972" stroke="#059669" stroke-width="1.5" fill="none"
            marker-end="url(#arr-emerald)" />
        <rect x="375" y="915" width="155" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="452" y="934" text-anchor="middle" fill="#6EE7B7" font-size="13" font-weight="500">Top Vector
            Matches</text>

        <!-- SQLite → Merge -->
        <path d="M970,858 Q970,925 765,972" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)" />
        <rect x="830" y="915" width="158" height="26" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
        <text x="909" y="934" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="500">Paths +
            Timestamps</text>

        <!-- Merge → Results -->
        <line x1="660" y1="1037" x2="660" y2="1093" stroke="#A78BFA" stroke-width="1.8" marker-end="url(#arr-indigo)" />

        <!-- Step reference panel -->
        <g transform="translate(1310, 460)">
            <rect x="-22" y="-22" width="225" height="350" rx="14" fill="#1E293B" stroke="#334155" stroke-width="0.5"
                opacity="0.5" />

            <text x="90" y="8" text-anchor="middle" fill="#64748B" font-size="13" font-weight="700"
                letter-spacing="2">INGESTION STEPS</text>
            <text x="0" y="50" fill="#FCD34D" font-size="15" font-weight="700">1.</text>
            <text x="24" y="50" fill="#CBD5E1" font-size="14">Save MP4 to disk</text>
            <text x="0" y="84" fill="#FCD34D" font-size="15" font-weight="700">2.</text>
            <text x="24" y="84" fill="#CBD5E1" font-size="14">embed_video() → Nova</text>
            <text x="0" y="118" fill="#FCD34D" font-size="15" font-weight="700">3.</text>
            <text x="24" y="118" fill="#CBD5E1" font-size="14">Insert metadata → SQLite</text>
            <text x="0" y="152" fill="#FCD34D" font-size="15" font-weight="700">4.</text>
            <text x="24" y="152" fill="#CBD5E1" font-size="14">Store vector → FAISS</text>
            <text x="0" y="186" fill="#FCD34D" font-size="15" font-weight="700">5.</text>
            <text x="24" y="186" fill="#CBD5E1" font-size="14">Cross-link faiss_id</text>

            <line x1="0" y1="212" x2="180" y2="212" stroke="#334155" stroke-width="0.5" />

            <text x="90" y="242" text-anchor="middle" fill="#64748B" font-size="13" font-weight="700"
                letter-spacing="2">SEARCH STEPS</text>
            <text x="0" y="278" fill="#A5B4FC" font-size="15" font-weight="700">1.</text>
            <text x="24" y="278" fill="#CBD5E1" font-size="14">Embed query → Nova</text>
            <text x="0" y="312" fill="#A5B4FC" font-size="15" font-weight="700">2.</text>
            <text x="24" y="312" fill="#CBD5E1" font-size="14">FAISS.search(k=top_k)</text>
        </g>

    </svg>
</body>

</html>
