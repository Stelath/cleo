[package]
name = "viture-sensors"
version = "0.1.0"
edition = "2021"
description = "Python + Rust bindings for VITURE XR glasses sensors"
license = "MIT"
build = "build.rs"

[lib]
name = "viture_sensors"
crate-type = ["cdylib", "rlib"]

[features]
default = []
mock-sdk = []

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }
numpy = "0.22"
ndarray = "0.16"
crossbeam-channel = "0.5"
crossbeam-utils = "0.8"
parking_lot = "0.12"
once_cell = "1.20"
cpal = "0.15"
ringbuf = "0.4"
thiserror = "2"
log = "0.4"
env_logger = "0.11"
hound = "3.5"
image = { version = "0.25", default-features = false, features = ["png"] }

[build-dependencies]
bindgen = "0.70"

[dev-dependencies]
anyhow = "1"
serial_test = "3"
