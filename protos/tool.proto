syntax = "proto3";

package cleo.tool;

service ToolService {
  // Execute a tool with JSON-encoded parameters
  rpc Execute(ToolRequest) returns (ToolResponse);
}

message ToolRequest {
  // Tool name (must match the registered tool name)
  string tool_name = 1;

  // JSON-encoded parameters from Bedrock tool_use output
  string parameters_json = 2;
}

message ToolResponse {
  // Whether the tool executed successfully
  bool success = 1;

  // Human-readable result text
  string result_text = 2;
}
