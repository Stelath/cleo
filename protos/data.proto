syntax = "proto3";

package cleo.data;

service DataService {
  // Store a transcription result in SQLite
  rpc StoreTranscription(StoreTranscriptionRequest) returns (StoreTranscriptionResponse);

  // Store a video clip as chunked upload, then embed via Nova and index in FAISS + SQLite
  rpc StoreVideoClip(stream StoreVideoClipChunk) returns (StoreVideoClipResponse);

  // Search by text, image, or video — embed query, search FAISS, join SQLite
  rpc Search(SearchRequest) returns (SearchResponse);

  // Search video clips by text query for frontend memory lookups
  rpc SearchVideoClipsByText(SearchVideoClipsByTextRequest) returns (SearchResponse);

  // Store a named item embedding captured from the current camera frame
  rpc StoreTrackedItem(StoreTrackedItemRequest) returns (StoreTrackedItemResponse);

  // Find the most recent matching video clip for a previously tracked item
  rpc FindLatestTrackedItemOccurrence(FindLatestTrackedItemOccurrenceRequest) returns (FindLatestTrackedItemOccurrenceResponse);

  // Get paginated transcription history
  rpc GetTranscriptionLog(TranscriptionLogRequest) returns (TranscriptionLogResponse);

  // Retrieve transcription rows whose timestamps overlap a given time window
  rpc GetTranscriptionsInRange(TimeRangeRequest) returns (TranscriptionRangeResponse);

  // Retrieve a video clip by ID as chunks
  rpc GetVideoClip(GetVideoClipRequest) returns (stream VideoClipChunk);

  // Register or update an app
  rpc RegisterApp(RegisterAppRequest) returns (RegisterAppResponse);

  // List registered apps with optional filters
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);

  // Enable or disable an app by name
  rpc SetAppEnabled(SetAppEnabledRequest) returns (SetAppEnabledResponse);

  // Get a user preference by key
  rpc GetPreference(GetPreferenceRequest) returns (GetPreferenceResponse);

  // Set a user preference by key
  rpc SetPreference(SetPreferenceRequest) returns (SetPreferenceResponse);
  
  // List video clips whose timestamps overlap a given time window
  rpc GetVideoClipsInRange(TimeRangeRequest) returns (VideoClipRangeResponse);

  // Store a generated note summary for later frontend retrieval
  rpc StoreNoteSummary(StoreNoteSummaryRequest) returns (StoreNoteSummaryResponse);

  // Get paginated note summaries
  rpc GetNoteSummaries(NoteSummariesRequest) returns (NoteSummariesResponse);

  // Store extracted food macro information for later recall
  rpc StoreFoodMacros(StoreFoodMacrosRequest) returns (StoreFoodMacrosResponse);

  // Get paginated food macro entries
  rpc GetFoodMacros(GetFoodMacrosRequest) returns (GetFoodMacrosResponse);

  // Store a face embedding with deduplication
  rpc StoreFaceEmbedding(StoreFaceEmbeddingRequest) returns (StoreFaceEmbeddingResponse);

  // Search faces by image similarity
  rpc SearchFaces(SearchFacesRequest) returns (SearchFacesResponse);

  // List stored face groups for frontend review
  rpc ListFaces(ListFacesRequest) returns (ListFacesResponse);

  // Fetch the stored representative image for a face group
  rpc GetFaceImage(GetFaceImageRequest) returns (GetFaceImageResponse);

  // Assign or clear a display name for a face group
  rpc SetFaceName(SetFaceNameRequest) returns (SetFaceNameResponse);

  // Remove one stored face group, its sightings, and its indexed embeddings
  rpc DeleteFace(DeleteFaceRequest) returns (DeleteFaceResponse);

  // Remove all stored face groups, sightings, and face index data
  rpc ClearFaces(ClearFacesRequest) returns (ClearFacesResponse);

  // Store a recording metadata entry linking to an existing video clip
  rpc StoreRecording(StoreRecordingRequest) returns (StoreRecordingResponse);

  // Get paginated recording entries
  rpc GetRecordings(GetRecordingsRequest) returns (GetRecordingsResponse);
}

// ── Store Transcription ──

message StoreTranscriptionRequest {
  string text = 1;
  float confidence = 2;
  double start_time = 3;
  double end_time = 4;
}

message StoreTranscriptionResponse {
  int64 id = 1;
}

// ── Store Video Clip ──

message StoreVideoClipMetadata {
  // Stable upload identity for all chunks in this request stream.
  string upload_id = 1;

  // Unix epoch seconds for clip boundaries.
  double start_timestamp = 2;
  double end_timestamp = 3;

  // Number of frames in the full clip.
  int32 num_frames = 4;
}

message MediaChunk {
  // Payload bytes for this chunk.
  bytes data = 1;

  // Stable media identity so chunks can be assembled.
  string media_id = 2;

  // Zero-based chunk index.
  int32 chunk_index = 3;

  // True if this is the final chunk for media_id.
  bool is_last = 4;
}

message StoreVideoClipChunk {
  oneof payload {
    StoreVideoClipMetadata metadata = 1;
    MediaChunk mp4_chunk = 2;
    MediaChunk embed_chunk = 3;
  }
}

message StoreVideoClipResponse {
  int64 clip_id = 1;
  int64 faiss_id = 2;
}

// ── Search ──

message SearchRequest {
  oneof query {
    string text = 1;
    bytes image_data = 2;
    bytes video_data = 3;
  }
  int32 top_k = 4;
}

message SearchResult {
  int64 clip_id = 1;
  float score = 2;
  double start_timestamp = 3;
  double end_timestamp = 4;
  string clip_path = 5;
  int32 num_frames = 6;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchVideoClipsByTextRequest {
  string query_text = 1;
  int32 top_k = 2;
  optional double start_timestamp = 3;
  optional double end_timestamp = 4;
}

// ── Tracked Items ──

message StoreTrackedItemRequest {
  string title = 1;
  bytes image_data = 2;
  double registered_at = 3;
}

message StoreTrackedItemResponse {
  int64 item_id = 1;
  bool created = 2;
  string title = 3;
  string normalized_title = 4;
}

message FindLatestTrackedItemOccurrenceRequest {
  string title = 1;
  int32 top_k = 2;
  optional float min_score = 3;
}

message FindLatestTrackedItemOccurrenceResponse {
  bool found_item = 1;
  int64 item_id = 2;
  string title = 3;
  bool found_occurrence = 4;
  SearchResult latest_result = 5;
  float min_score_used = 6;
}

// ── Transcription Log ──

message TranscriptionLogRequest {
  // Maximum number of entries to return (default: 50)
  int32 limit = 1;

  // Offset for pagination
  int32 offset = 2;
}

message TranscriptionLogEntry {
  int64 id = 1;
  string text = 2;
  float confidence = 3;
  double start_time = 4;
  double end_time = 5;
  double created_at = 6;
}

message TranscriptionLogResponse {
  repeated TranscriptionLogEntry entries = 1;
  int32 total_count = 2;
}

message TimeRangeRequest {
  double start_timestamp = 1;
  double end_timestamp = 2;
}

message TranscriptionRangeResponse {
  repeated TranscriptionLogEntry entries = 1;
}

// ── Get Video Clip ──

message GetVideoClipRequest {
  int64 clip_id = 1;
}

message VideoClipMetadata {
  int64 clip_id = 1;
  string clip_path = 2;
  double start_timestamp = 3;
  double end_timestamp = 4;
  int32 num_frames = 5;
  double created_at = 6;
}

message VideoClipChunk {
  bytes data = 1;
  int64 clip_id = 2;
  int32 chunk_index = 3;
  bool is_last = 4;
  double start_timestamp = 5;
  double end_timestamp = 6;
  int32 num_frames = 7;
}

// ── App Registration ──

message RegisterAppRequest {
  string name = 1;
  string description = 2;
  string app_type = 3;
  string grpc_address = 4;
  string input_schema_json = 5;
}

message RegisterAppResponse {
  int64 id = 1;
  bool created = 2;
}

message ListAppsRequest {
  bool enabled_only = 1;
  string app_type = 2;
}

message AppInfo {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string app_type = 4;
  string grpc_address = 5;
  string input_schema_json = 6;
  bool enabled = 7;
  double registered_at = 8;
  double updated_at = 9;
}

message ListAppsResponse {
  repeated AppInfo apps = 1;
}

message SetAppEnabledRequest {
  string name = 1;
  bool enabled = 2;
}

message SetAppEnabledResponse {
  bool success = 1;
}

// ── Preferences ──

message GetPreferenceRequest {
  string key = 1;
}

message GetPreferenceResponse {
  string value = 1;
  bool found = 2;
}

message SetPreferenceRequest {
  string key = 1;
  string value = 2;
}

message SetPreferenceResponse {
  bool success = 1;
}

message VideoClipRangeResponse {
  repeated VideoClipMetadata clips = 1;
}

// ── Note Summaries ──

message StoreNoteSummaryRequest {
  string summary_text = 1;
  double start_timestamp = 2;
  double end_timestamp = 3;
}

message StoreNoteSummaryResponse {
  int64 id = 1;
}

message NoteSummariesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message NoteSummaryEntry {
  int64 id = 1;
  string summary_text = 2;
  double start_timestamp = 3;
  double end_timestamp = 4;
  double created_at = 5;
}

message NoteSummariesResponse {
  repeated NoteSummaryEntry entries = 1;
  int32 total_count = 2;
}

// ── Food Macros ──

message StoreFoodMacrosRequest {
  string product_name = 1;
  string brand = 2;
  string barcode = 3;
  string basis = 4;
  double calories_kcal = 5;
  double protein_g = 6;
  double fat_g = 7;
  double carbs_g = 8;
  string serving_size = 9;
  double serving_quantity = 10;
  double recorded_at = 11;
}

message StoreFoodMacrosResponse {
  int64 id = 1;
}

message GetFoodMacrosRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message FoodMacroEntry {
  int64 id = 1;
  string product_name = 2;
  string brand = 3;
  string barcode = 4;
  string basis = 5;
  optional double calories_kcal = 6;
  optional double protein_g = 7;
  optional double fat_g = 8;
  optional double carbs_g = 9;
  string serving_size = 10;
  optional double serving_quantity = 11;
  double recorded_at = 12;
  double created_at = 13;
}

message GetFoodMacrosResponse {
  repeated FoodMacroEntry entries = 1;
  int32 total_count = 2;
}

// ── Faces ──

message StoreFaceEmbeddingRequest {
  bytes image_data = 1;
  double timestamp = 2;
  float confidence = 3;
}

message StoreFaceEmbeddingResponse {
  int64 face_id = 1;
  int64 faiss_id = 2;
  bool is_new = 3;
  int64 matched_face_id = 4;
}

message SearchFacesRequest {
  bytes image_data = 1;
  int32 top_k = 2;
}

message FaceSearchResult {
  int64 face_id = 1;
  float score = 2;
  double first_seen = 3;
  double last_seen = 4;
  int32 seen_count = 5;
  string thumbnail_path = 6;
  string name = 7;
  string note = 8;
}

message SearchFacesResponse {
  repeated FaceSearchResult results = 1;
}

message ListFacesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message FaceEntry {
  int64 face_id = 1;
  string name = 2;
  string note = 3;
  double first_seen = 4;
  double last_seen = 5;
  int32 seen_count = 6;
  string thumbnail_path = 7;
  optional float confidence = 8;
  int32 collage_image_count = 9;
}

message ListFacesResponse {
  repeated FaceEntry entries = 1;
  int32 total_count = 2;
}

message GetFaceImageRequest {
  int64 face_id = 1;
  optional int32 sighting_index = 2;
}

message GetFaceImageResponse {
  bytes image_data = 1;
  string content_type = 2;
}

message SetFaceNameRequest {
  int64 face_id = 1;
  string name = 2;
  string note = 3;
}

message SetFaceNameResponse {
  bool updated = 1;
  string name = 2;
  string note = 3;
}

message DeleteFaceRequest {
  int64 face_id = 1;
}

message DeleteFaceResponse {
  bool deleted = 1;
  int32 sightings_deleted = 2;
}

message ClearFacesRequest {}

message ClearFacesResponse {
  int32 faces_deleted = 1;
  int32 sightings_deleted = 2;
}

// ── Recordings ──

message StoreRecordingRequest {
  int64 clip_id = 1;
  double started_at = 2;
  double ended_at = 3;
}

message StoreRecordingResponse {
  int64 id = 1;
  int64 clip_id = 2;
}

message GetRecordingsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message RecordingEntry {
  int64 id = 1;
  int64 clip_id = 2;
  double started_at = 3;
  double ended_at = 4;
  double created_at = 5;
}

message GetRecordingsResponse {
  repeated RecordingEntry entries = 1;
  int32 total_count = 2;
}
