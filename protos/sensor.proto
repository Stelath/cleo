syntax = "proto3";

package cleo.sensor;

service SensorService {
  // Server-side streaming: continuous camera frames as chunked H.264 payloads.
  rpc StreamCamera(StreamRequest) returns (stream CameraFrameChunk);

  // Server-side streaming: continuous audio chunks
  rpc StreamAudio(StreamRequest) returns (stream AudioChunk);

  // Server-side streaming: continuous IMU readings
  rpc StreamIMU(StreamRequest) returns (stream IMUData);

  // Server-side streaming: capture a single still frame as chunked JPEG payload.
  rpc CaptureFrame(CaptureRequest) returns (stream CameraFrameChunk);

  // Unary: record a fixed-duration audio clip
  rpc RecordAudio(RecordRequest) returns (AudioChunk);
}

message StreamRequest {
  // Target frames per second for camera streaming (default: 30)
  float fps = 1;

  // Audio chunk duration in milliseconds (default: 500)
  int32 chunk_ms = 2;

  // Audio sample rate in Hz (default: 48000)
  int32 sample_rate = 3;
}

message CaptureRequest {}

enum FrameEncoding {
  FRAME_ENCODING_UNSPECIFIED = 0;
  FRAME_ENCODING_JPEG = 1;
  FRAME_ENCODING_H264 = 2;
  FRAME_ENCODING_RGB24 = 3;
}

message RecordRequest {
  // Duration in milliseconds
  int32 duration_ms = 1;

  // Sample rate in Hz (default: 48000)
  int32 sample_rate = 2;
}

message CameraFrameChunk {
  // Chunk bytes for an encoded frame payload.
  bytes data = 1;

  // Stable frame identity so clients can assemble chunks.
  string frame_id = 2;

  // Zero-based position of this chunk for frame_id.
  int32 chunk_index = 3;

  // True if this is the final chunk for frame_id.
  bool is_last = 4;

  // Frame dimensions (repeated on all chunks for simplicity).
  int32 width = 5;
  int32 height = 6;

  // Capture timestamp (Unix epoch seconds, float).
  double timestamp = 7;

  // Encoding for the frame payload bytes represented by this chunk stream.
  FrameEncoding encoding = 8;

  // True if this frame is an intra/key frame in the encoded stream.
  bool key_frame = 9;
}

message AudioChunk {
  // Raw PCM float32 audio data (little-endian)
  bytes data = 1;

  // Sample rate in Hz
  int32 sample_rate = 2;

  // Number of samples in this chunk
  int32 num_samples = 3;

  // Chunk timestamp (Unix epoch seconds, float)
  double timestamp = 4;
}

message IMUData {
  // Acceleration [x, y, z]
  repeated float accel = 1;

  // Angular velocity [x, y, z]
  repeated float gyro = 2;

  // Orientation quaternion [w, x, y, z]
  repeated float quaternion = 3;

  // Timestamp in nanoseconds
  uint64 timestamp_ns = 4;
}
