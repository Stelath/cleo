syntax = "proto3";

package cleo.transcription;

service TranscriptionService {
  // Bidirectional streaming: send audio chunks, receive transcription results
  rpc TranscribeStream(stream AudioInput) returns (stream TranscriptionResult);

  // Unary: transcribe a complete audio buffer
  rpc Transcribe(AudioInput) returns (TranscriptionResult);
}

message AudioInput {
  // Raw PCM float32 audio data (little-endian, mono)
  bytes audio_data = 1;

  // Sample rate in Hz (default: 48000)
  int32 sample_rate = 2;

  // Signal that this is the final chunk in a stream
  bool is_final = 3;

  // Optional stable stream identity across reconnects
  string stream_id = 4;

  // Force a hard utterance boundary and clear prior context
  bool reset_context = 5;

  // Unix epoch seconds (UTC) for the end of this audio buffer
  double timestamp = 6;
}

message TranscriptionResult {
  // Transcribed text
  string text = 1;

  // Confidence score [0.0, 1.0]
  float confidence = 2;

  // Start time as Unix epoch seconds (UTC)
  double start_time = 3;

  // End time as Unix epoch seconds (UTC)
  double end_time = 4;

  // Whether this is a partial (interim) or final result
  bool is_partial = 5;

  // Stable identifier for all revisions of the same utterance
  string utterance_id = 6;
}
